<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Nivåer för aspekt: {{ aspect_name }}</title>
    <style>
        table { border-collapse: collapse; width: 60%; }
        th, td { border: 1px solid #444; padding: 6px; }
        th { background: #eee; }
    </style>
</head>
<body>

<h2>Nivåer för aspekt: {{ aspect_name }}</h2>

<table>
    <thead>
        <tr>
            <th>Nivå</th>
            <th>Beskrivning</th>
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            <td>{{ row.level }}</td>
            <td>{{ row.description }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<p><a href="/aspects">Tillbaka till aspekter</a></p>

</body>
</html>
