<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Consequences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/consequences.css') }}">
  <script src="{{ url_for('static', filename='common.js') }}"></script>
  <script src="{{ url_for('static', filename='nav.js') }}" defer></script>
</head>
<body>

  <h1>Consequences</h1>

  <section class="section" id="consequencesSection">
    <div class="section-header">
      <h2>Named consequences</h2>
      <button id="btnShowConsequenceSpace">Show consequence space</button>
      <a href="/dominance-graph" class="header-link-button">Show dominance graph</a>
    </div>
    <table class="data-table consequences-table" id="consequencesTable">
      <thead>
        <tr id="consequencesHeaders"></tr>
      </thead>
      <tbody id="consequencesBody">
        <tr><td class="muted">Loading...</td></tr>
      </tbody>
      <tfoot class="add-consequence-foot">
        <tr class="add-consequence-inputs"></tr>
        <tr class="add-consequence-action">
          <td id="addConsequenceActionCell" colspan="1">
            <div class="consequence-action-row">
              <span class="action-spacer"></span>
              <button id="btnAddConsequence" class="primary">Add consequence</button>
              <button id="btnClearForm">Clear</button>
            </div>
          </td>
        </tr>
        <tr class="add-consequence-notice" hidden>
          <td id="addConsequenceNoticeCell" colspan="1">
            <p id="addConsequenceFeedback"></p>
          </td>
        </tr>
      </tfoot>
    </table>

  </section>

  <!-- ── Consequence comparison ─────────────────────────── -->
  <section class="section" id="consCompareSection" hidden>
    <div class="section-header">
      <h2>Compare consequences</h2>
      <button id="btnClearConsCompare" class="secondary">Clear</button>
    </div>
    <div id="consCompare" class="dom-compare"></div>
    <div id="consInferencePanel" class="inference-panel" hidden>
      <div id="consInferenceAdds"  class="inference-adds"  hidden></div>
      <div id="consInferenceColls" class="inference-colls" hidden></div>
    </div>
  </section>

  <!-- ── Consequence space dialog ─────────────────────────── -->
  <dialog id="consequenceSpaceDialog">
    <div class="dialog-header">
      <h2>Consequence space</h2>
      <button id="btnCloseDialog" class="secondary">Close</button>
    </div>
    <p class="hint">
      Highlighted rows already have a name in the named consequences set.
      Click any row to pre-fill the add-consequence form.
    </p>
    <div class="dialog-table-wrapper">
      <table class="data-table" id="consequenceSpaceTable">
        <thead><tr id="consequenceSpaceHeaders"></tr></thead>
        <tbody id="consequenceSpaceBody"></tbody>
      </table>
    </div>
  </dialog>

  <script>
    const NEW_LEVEL_SENTINEL = "__new__";
    let aspectData   = [];  // [{name, levels}, ...]
    let levelDescs   = {};  // {aspectName: {level: description}}

    function showConsequenceFeedback(msg, isOk) {
      const p   = document.getElementById("addConsequenceFeedback");
      const row = document.querySelector(".add-consequence-notice");
      p.textContent = msg;
      p.className   = isOk ? "feedback-ok" : "feedback-error";
      row.hidden    = false;
    }
    function hideConsequenceFeedback() {
      document.querySelector(".add-consequence-notice").hidden = true;
    }

    // ── Load aspects (needed to build add-consequence form) ────
    async function loadAspects() {
      const [aspRes, descRes] = await Promise.all([
        fetch("/api/aspects"),
        fetch("/api/level-descriptions")
      ]);
      if (!aspRes.ok) return;
      const data = await aspRes.json();
      aspectData = data.rows.map(row => ({ name: row[0], levels: row[3] ? row[3].split(", ").filter(Boolean) : [] }));
      if (descRes.ok) levelDescs = await descRes.json();
      rebuildConsequenceTableStructure();
    }

    // ── Hybrid dropdown/text input ─────────────────────────────
    function buildHybridInput(aspectName, levels) {
      const container = document.createElement("div");
      container.className = "hybrid-input";
      container.dataset.aspect = aspectName;

      const select = document.createElement("select");
      select.className = "level-select";

      const blankOpt = document.createElement("option");
      blankOpt.value = "";
      blankOpt.textContent = "— select level —";
      select.appendChild(blankOpt);

      levels.forEach(level => {
        const opt = document.createElement("option");
        opt.value = level;
        opt.textContent = level;
        select.appendChild(opt);
      });

      const newOpt = document.createElement("option");
      newOpt.value = NEW_LEVEL_SENTINEL;
      newOpt.textContent = "New level...";
      select.appendChild(newOpt);

      const textInput = document.createElement("input");
      textInput.type = "text";
      textInput.className = "level-text";
      textInput.placeholder = "New level value";
      textInput.hidden = true;

      select.addEventListener("change", () => {
        const isNew = select.value === NEW_LEVEL_SENTINEL;
        textInput.hidden = !isNew;
        if (isNew) { textInput.value = ""; textInput.focus(); }
      });

      container.appendChild(select);
      container.appendChild(textInput);
      return container;
    }

    // ── Build / rebuild the consequences table thead + tfoot ───
    function rebuildConsequenceTableStructure() {
      const colCount = 1 + aspectData.length;

      const headersRow = document.getElementById("consequencesHeaders");
      headersRow.innerHTML = "";
      ["Short name", ...aspectData.map(a => a.name)].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headersRow.appendChild(th);
      });

      const inputsRow = document.querySelector(".add-consequence-inputs");
      inputsRow.innerHTML = "";

      const shortTd = document.createElement("td");
      const shortInput = document.createElement("input");
      shortInput.type = "text";
      shortInput.id = "inputShortName";
      shortInput.placeholder = "e.g. C1";
      shortTd.appendChild(shortInput);
      inputsRow.appendChild(shortTd);

      aspectData.forEach(({ name, levels }) => {
        const td = document.createElement("td");
        td.appendChild(buildHybridInput(name, levels));
        inputsRow.appendChild(td);
      });

      document.getElementById("addConsequenceActionCell").colSpan = colCount;
      document.getElementById("addConsequenceNoticeCell").colSpan = colCount;
    }

    // ── Load consequences and populate tbody ───────────────────
    async function loadConsequences() {
      const tbody = document.getElementById("consequencesBody");
      if (!tbody) return;

      const res = await fetch("/api/consequences");
      if (!res.ok) {
        tbody.innerHTML = "<tr><td class='error'>Failed to load consequences.</td></tr>";
        return;
      }
      const data = await res.json();

      if (!data.rows || data.rows.length === 0) {
        const colCount = 1 + aspectData.length;
        tbody.innerHTML = `<tr><td colspan="${colCount}" class="muted">No consequences defined yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      consNodeData = {};
      data.rows.forEach(row => {
        const tr = document.createElement("tr");
        const shortName = row[0];
        // Build consNodeData: {name, levels: {asp: level}}
        const levels = {};
        aspectData.forEach((a, i) => { levels[a.name] = row[i + 1] ?? ""; });
        consNodeData[shortName] = { name: shortName, levels };
        row.forEach((cell, i) => {
          const td = document.createElement("td");
          if (i === 0) {
            const b = document.createElement("strong");
            b.textContent = cell;
            td.appendChild(b);
            // Click on name cell selects this consequence for comparison
            td.style.cursor = "pointer";
            td.title = "Click to select for comparison";
            td.addEventListener("click", () => onConsNameClick(shortName, tr));
          } else {
            td.textContent = cell;
            const aspName = aspectData[i - 1]?.name;
            const desc = aspName && levelDescs[aspName]?.[cell];
            if (desc) td.title = desc;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    // ── Helper: get level value from a hybrid input ────────────
    function getLevelValue(aspectName) {
      const container = document.querySelector(
        `.hybrid-input[data-aspect="${CSS.escape(aspectName)}"]`
      );
      if (!container) return "";
      const select    = container.querySelector(".level-select");
      const textInput = container.querySelector(".level-text");
      return select.value === NEW_LEVEL_SENTINEL ? textInput.value.trim() : select.value;
    }

    // ── Add consequence ────────────────────────────────────────
    document.getElementById("btnAddConsequence").addEventListener("click", async () => {
      const shortName = document.getElementById("inputShortName").value.trim();
      if (!shortName) { showConsequenceFeedback("Short name must be non-empty.", false); return; }

      const payload = {};
      const missing = [];
      aspectData.forEach(({ name }) => {
        const value = getLevelValue(name);
        if (!value) missing.push(name);
        payload[name] = value;
      });
      if (missing.length) { showConsequenceFeedback(`Please enter a level for: ${missing.join(", ")}.`, false); return; }

      const res = await fetch("/api/consequences", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ short_name: shortName, aspect_levels: payload })
      });

      if (res.ok) {
        const json = await res.json();
        const newLevels = json.new_levels || [];
        let msg = `Consequence '${shortName}' added.`;
        if (newLevels.length > 0) msg += ` New levels: ${newLevels.join(", ")}.`;
        showConsequenceFeedback(msg, true);
        document.getElementById("inputShortName").value = "";
        await loadAspects();
        await loadConsequences();
        domGraphDirty = true;
        if (domGraphVisible) { await renderDomGraph(); domGraphDirty = false; }
      } else {
        let msg = `${res.status} ${res.statusText}`;
        try { const j = await res.json(); msg = j.error || msg; } catch {}
        showConsequenceFeedback(msg, false);
      }
    });

    document.getElementById("btnClearForm").addEventListener("click", () => {
      document.getElementById("inputShortName").value = "";
      document.querySelectorAll(".add-consequence-inputs .hybrid-input").forEach(container => {
        container.querySelector(".level-select").value = "";
        const ti = container.querySelector(".level-text");
        ti.value = ""; ti.hidden = true;
      });
      hideConsequenceFeedback();
    });

    // ── Consequence space dialog ───────────────────────────────
    const dialog   = document.getElementById("consequenceSpaceDialog");
    const btnShow  = document.getElementById("btnShowConsequenceSpace");
    const btnClose = document.getElementById("btnCloseDialog");

    function getNamedLevelTuples() {
      const named = new Map();
      const tbody = document.getElementById("consequencesBody");
      if (!tbody) return named;
      tbody.querySelectorAll("tr").forEach(tr => {
        const cells = Array.from(tr.querySelectorAll("td"));
        if (cells.length < 2) return;
        const shortName = cells[0].textContent.trim();
        const key = JSON.stringify(cells.slice(1).map(td => td.textContent.trim()));
        named.set(key, shortName);
      });
      return named;
    }

    async function openConsequenceSpaceDialog() {
      const res = await fetch("/api/consequence_space");
      if (!res.ok) { alert("Could not load consequence space."); return; }
      const data = await res.json();

      const headersRow = document.getElementById("consequenceSpaceHeaders");
      headersRow.innerHTML = "";
      const nameTh = document.createElement("th");
      nameTh.textContent = "Name";
      headersRow.appendChild(nameTh);
      data.headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headersRow.appendChild(th);
      });

      const tbody = document.getElementById("consequenceSpaceBody");
      tbody.innerHTML = "";
      const namedMap = getNamedLevelTuples();

      data.rows.forEach(row => {
        const tr = document.createElement("tr");
        const key = JSON.stringify(row);
        const shortName = namedMap.get(key) ?? "";
        if (shortName) tr.classList.add("named-consequence");

        const nameTd = document.createElement("td");
        nameTd.textContent = shortName;
        tr.appendChild(nameTd);

        row.forEach(cell => {
          const td = document.createElement("td");
          td.textContent = cell;
          tr.appendChild(td);
        });

        tr.addEventListener("click", () => {
          data.headers.forEach((aspectName, i) => {
            const container = document.querySelector(
              `.hybrid-input[data-aspect="${CSS.escape(aspectName)}"]`
            );
            if (!container) return;
            const select    = container.querySelector(".level-select");
            const textInput = container.querySelector(".level-text");
            const value     = row[i];
            const exists    = Array.from(select.options).some(o => o.value === value);
            if (exists) {
              select.value = value;
              textInput.hidden = true;
            } else {
              select.value = NEW_LEVEL_SENTINEL;
              textInput.hidden = false;
              textInput.value = value;
            }
          });
          dialog.close();
          document.getElementById("inputShortName").focus();
        });

        tbody.appendChild(tr);
      });

      dialog.showModal();
    }

    btnShow.addEventListener("click", openConsequenceSpaceDialog);
    btnClose.addEventListener("click", () => dialog.close());
    dialog.addEventListener("click", e => { if (e.target === dialog) dialog.close(); });


    // ── Consequence comparison ─────────────────────────────
    let consNodeData  = {};
    let consFirstName = null;
    let consAspects   = [];

    // Symbol constants from server (window.EUDOXA set by nav.js)
    const C    = window.EUDOXA || {};
    const BT   = C.BT   || "≻";
    const BTE  = C.BTE  || "⪰";
    const EQ   = C.EQ   || "∼";
    const WTE  = C.WTE  || "⪯";
    const WT   = C.WT   || "≺";
    const EM_DASH = C.EM_DASH || "—";

    function relClass(rel) {
      if (rel === BT || rel === BTE) return "rel-better";
      if (rel === EQ)                         return "rel-equal";
      if (rel === WT || rel === WTE) return "rel-worse";
      return "rel-unset";
    }

    function showConsInferencePanel(la, rel, lb, adds, inferredAdds, colls) {
      const panel    = document.getElementById("consInferencePanel");
      const addsDiv  = document.getElementById("consInferenceAdds");
      const collsDiv = document.getElementById("consInferenceColls");
      clearTimeout(panel._hideTimer);
      addsDiv.hidden = true; collsDiv.hidden = true;
      const relLabel = rel === "" ? EM_DASH : rel;
      if (colls.length > 0) {
        collsDiv.innerHTML = `<strong>Relation not set ${EM_DASH} collision detected:</strong> ${la} ${relLabel} ${lb}<ul>`
          + colls.map(s => `<li>${s}</li>`).join("") + "</ul>";
        collsDiv.hidden = false;
      } else {
        const verb = rel === "" ? "unset" : "set";
        let html = `<strong>Relation ${verb}:</strong> ${la} ${relLabel} ${lb}`;
        if (adds.length > 0)
          html += "<br><strong>Added to matrix:</strong><ul>" + adds.map(s => `<li>${s}</li>`).join("") + "</ul>";
        if (inferredAdds.length > 0)
          html += "<br><strong>Inferred in closure:</strong><ul>" + inferredAdds.map(s => `<li>${s}</li>`).join("") + "</ul>";
        addsDiv.innerHTML = html; addsDiv.hidden = false;
      }
      panel.hidden = false;
      panel._hideTimer = setTimeout(() => { panel.hidden = true; }, 8000);
    }

    function clearConsCompare() {
      consFirstName = null;
      // Remove highlight from all rows
      document.querySelectorAll("#consequencesBody tr.cons-selected")
        .forEach(r => r.classList.remove("cons-selected"));
      document.getElementById("consCompareSection").hidden = true;
      document.getElementById("consInferencePanel").hidden = true;
    }

    document.getElementById("btnClearConsCompare")
      .addEventListener("click", clearConsCompare);

    function showConsFirstRow(name) {
      consAspects = aspectData.map(a => a.name);
      const a = consNodeData[name];
      if (!a) return;
      const table = document.createElement("table");
      table.className = "data-table dom-compare-table";
      const tr = document.createElement("tr");
      const tdName = document.createElement("td");
      tdName.className = "dom-compare-name"; tdName.textContent = a.name;
      tr.appendChild(tdName);
      consAspects.forEach(asp => {
        const td = document.createElement("td"); td.textContent = a.levels[asp] ?? ""; tr.appendChild(td);
      });
      table.appendChild(tr);
      const panel = document.getElementById("consCompare");
      panel.innerHTML = ""; panel.appendChild(table);
      document.getElementById("consCompareSection").hidden = false;
    }

    function onConsNameClick(name, tr) {
      if (!consFirstName) {
        consFirstName = name;
        document.querySelectorAll("#consequencesBody tr.cons-selected")
          .forEach(r => r.classList.remove("cons-selected"));
        tr.classList.add("cons-selected");
        showConsFirstRow(name);
      } else if (consFirstName === name) {
        clearConsCompare();
      } else {
        tr.classList.add("cons-selected");
        fetchAndRenderConsComparison(
          consNodeData[consFirstName], consNodeData[name],
          document.getElementById("consCompare")
        );
        consFirstName = null;
      }
    }

    async function fetchAndRenderConsComparison(a, b, panel) {
      consAspects = aspectData.map(a => a.name);
      const relMaps = {}, optMaps = {};
      await Promise.all(consAspects.map(async asp => {
        const res = await fetch(`/api/aspects/${encodeURIComponent(asp)}/relations`);
        if (res.ok) {
          const data = await res.json();
          relMaps[asp] = data.cells || {};
          optMaps[asp] = data.options || [];
        }
      }));

      const table = document.createElement("table");
      table.className = "data-table dom-compare-table";

      // Row A
      const trA = document.createElement("tr");
      const tdNameA = document.createElement("td");
      tdNameA.className = "dom-compare-name"; tdNameA.textContent = a.name;
      trA.appendChild(tdNameA);
      consAspects.forEach(asp => {
        const td = document.createElement("td"); td.textContent = a.levels[asp] ?? ""; trA.appendChild(td);
      });

      // Relation row with dropdowns
      const trRel = document.createElement("tr");
      const tdDiv = document.createElement("td"); tdDiv.className = "dom-compare-divider";
      trRel.appendChild(tdDiv);
      consAspects.forEach(asp => {
        const la  = a.levels[asp] ?? "";
        const lb  = b.levels[asp] ?? "";
        const rel = relMaps[asp]?.[`${la}|||${lb}`] ?? "";
        const td  = document.createElement("td");
        if (la === lb) {
          td.className = "rel-diag dom-compare-rel";
          td.textContent = EQ;
        } else {
          td.className = relClass(rel) + " dom-compare-rel";
          const sel = document.createElement("select");
          sel.className = "rel-select dom-rel-select";
          (optMaps[asp] || []).forEach(opt => {
            const o = document.createElement("option");
            o.value = opt; o.textContent = opt === "" ? EM_DASH : opt;
            if (opt === rel) o.selected = true;
            sel.appendChild(o);
          });
          let currentRel = rel;
          sel.addEventListener("change", async () => {
            const newRel = sel.value;
            const res = await fetch(
              `/api/aspects/${encodeURIComponent(asp)}/relations/${encodeURIComponent(la)}/${encodeURIComponent(lb)}`,
              { method: "PATCH", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ relation: newRel }) }
            );
            const json = await res.json().catch(() => ({}));
            if (res.ok) {
              currentRel = newRel;
              td.className = relClass(newRel) + " dom-compare-rel";
              showConsInferencePanel(la, newRel, lb, json.adds || [], json.inferred_adds || [], []);
              fetchAndRenderConsComparison(a, b, panel);
            } else {
              sel.value = currentRel;
              showConsInferencePanel(la, newRel, lb, [], [], json.colls || [json.error] || []);
            }
          });
          td.appendChild(sel);
        }
        trRel.appendChild(td);
      });

      // Row B
      const trB = document.createElement("tr");
      const tdNameB = document.createElement("td");
      tdNameB.className = "dom-compare-name"; tdNameB.textContent = b.name;
      trB.appendChild(tdNameB);
      consAspects.forEach(asp => {
        const td = document.createElement("td"); td.textContent = b.levels[asp] ?? ""; trB.appendChild(td);
      });

      table.appendChild(trA); table.appendChild(trRel); table.appendChild(trB);
      panel.innerHTML = ""; panel.appendChild(table);
      document.getElementById("consCompareSection").hidden = false;
    }

    // ── Initial load ───────────────────────────────────────────
    loadAspects().then(loadConsequences);
  </script>

</body>
</html>
