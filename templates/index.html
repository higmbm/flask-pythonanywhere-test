<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
</head>
<body>

  <!-- Server-side state passed to JS via data attribute -->
  <div id="appState" data-has-project="{{ 'true' if project_name else 'false' }}" hidden></div>

  {% if project_name %}
    <!-- Project exists: show name and Manage button -->
    <p>
      <strong>Current project:</strong>
      <span class="muted">{{ project_name }}</span>
      <button id="btnManage">Manage project</button>
    </p>

    <!-- Management panel (hidden until Manage is clicked) -->
    <div id="managePanel" class="action-panel" hidden>
      <label for="project_name">New name:</label>
      <input id="project_name" type="text" value="{{ project_name }}">
      <button id="btnRename">Rename (PUT)</button>
      <button id="btnDelete" class="danger">Delete (DELETE)</button>
    </div>

  {% else %}
    <!-- No project: show create form immediately -->
    <div class="action-panel">
      <label for="project_name">Project name:</label>
      <input id="project_name" type="text" placeholder="Enter project name">
      <button id="btnCreate">Create (POST)</button>
    </div>

  {% endif %}

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <script>
    const hasProject = document.getElementById("appState").dataset.hasProject === "true";

    // ---- Toggle manage panel ----
    const btnManage   = document.getElementById("btnManage");
    const managePanel = document.getElementById("managePanel");

    if (btnManage) {
      btnManage.addEventListener("click", () => {
        managePanel.hidden = !managePanel.hidden;
      });
    }

    // ---- Rename ----
    const btnRename = document.getElementById("btnRename");
    if (btnRename) {
      btnRename.addEventListener("click", async () => {
        const name = document.getElementById("project_name").value.trim();
        if (!name) { alert("Project name must be non-empty."); return; }

        const res = await fetch("/api/project", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ project_name: name })
        });

        if (res.ok) {
          location.reload();
        } else {
          let msg = `${res.status} ${res.statusText}`;
          try { const j = await res.json(); msg = j.error || msg; } catch {}
          alert(msg);
        }
      });
    }

    // ---- Delete ----
    const btnDelete = document.getElementById("btnDelete");
    if (btnDelete) {
      btnDelete.addEventListener("click", async () => {
        const res = await fetch("/api/project", { method: "DELETE" });
        if (res.status === 204) {
          location.reload();
        } else {
          alert("Error deleting project.");
        }
      });
    }

    // ---- Create ----
    const btnCreate = document.getElementById("btnCreate");
    if (btnCreate) {
      btnCreate.addEventListener("click", async () => {
        const name = document.getElementById("project_name").value.trim();
        if (!name) { alert("Project name must be non-empty."); return; }

        const res = await fetch("/api/project", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ project_name: name })
        });

        if (res.ok) {
          location.reload();
        } else {
          let msg = `${res.status} ${res.statusText}`;
          try { const j = await res.json(); msg = j.error || msg; } catch {}
          alert(msg);
        }
      });
    }
  </script>
</body>
</html>
