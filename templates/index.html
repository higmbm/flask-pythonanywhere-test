<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
</head>
<body>
  {% if project_name %}
    <p class="row">
      <strong>Current project:</strong>
      <span class="muted">{{ project_name }}</span>
    </p>
  {% endif %}

  <!-- data-has-project is set server-side so the JS stays syntactically valid -->
  <div id="appState" data-has-project="{{ 'true' if project_name else 'false' }}" hidden></div>

  <div class="row">
    <label for="project_name">Project name:</label>
    <input id="project_name" type="text" placeholder="Enter project name"
           value="{{ project_name or '' }}">
    <button id="btnSaveProject">
      {% if project_name %}Rename (PUT){% else %}Create (POST){% endif %}
    </button>
  </div>

  {% if project_name %}
    <div class="row">
      <button id="btnDeleteProject">Delete project (DELETE)</button>
    </div>
  {% endif %}

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <script>
    // Determine which HTTP method to use: POST if no project exists, PUT if one does.
    const hasProject = document.getElementById("appState").dataset.hasProject === "true";

    document.getElementById("btnSaveProject").addEventListener("click", async () => {
      const name = document.getElementById("project_name").value.trim();
      if (!name) { alert("Project name must be non-empty."); return; }

      const method = hasProject ? "PUT" : "POST";
      const res = await fetch("/api/project", {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ project_name: name })
      });

      if (res.ok) {
        location.reload();
      } else {
        let msg = `${res.status} ${res.statusText}`;
        try { const j = await res.json(); msg = j.error || msg; } catch {}
        alert(msg);
      }
    });

    const btnDelete = document.getElementById("btnDeleteProject");
    if (btnDelete) {
      btnDelete.addEventListener("click", async () => {
        if (!confirm("Delete the current project?")) return;
        const res = await fetch("/api/project", { method: "DELETE" });
        if (res.status === 204) {
          location.reload();
        } else {
          alert("Error deleting project.");
        }
      });
    }
  </script>
</body>
</html>
